version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: specpoints-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: specpoints
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - specpoints-network

  # Backend API
  api:
    build:
      context: ./spec-points-api
      dockerfile: Dockerfile
    container_name: specpoints-api
    environment:
      NODE_ENV: development
      PORT: 3000
      API_PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/specpoints
